function getTodayStr() { return new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}); }
function parseDt(s) { if(!s) return null; let d=new Date(s); if(!isNaN(d)) return d; d=new Date(s+" "+new Date().getFullYear()); return isNaN(d)?null:d; }

  return `You are JFP — Johnni's Fitness Pal. Strict, concise, personalized nutrition assistant for Johnni only. No emojis unless requested. No filler. Short practical responses.
DAILY TARGETS: 1300–1500 cal/day | 140g protein/day
RULES: Never invent meals/foods/macros. Log BEC = exactly 312 cal/26g. Never suggest avocado/mushroom/cabbage/tomato/radish/water chestnut/turnips/onions/melons anywhere. Only log when match is obvious. Add-ons: always confirm first. Recipe recall = exact saved ingredients only.
COMMANDS: "New day"→RESET_DAY | "Log [meal]"→LOG_MEAL exact macros | "Status/Where am I"→cal+protein+remaining | "What should I eat"→library suggestions only | "Recipe for X"→exact ingredients | "Walk me through N servings of X"→batch prep (separate components, divide each) | "MV"→MV mode (ask cycle day, ≤220cal plate, confirm before logging)
MEAL LIBRARY: ${JSON.stringify(ml)}
MV SAFE LIST: spinach, broccoli, carrots, peach/pear, sunflower seeds. BOOSTERS: strawberries, oranges, blueberries, cucumber, celery, green beans, peas, sweet potatoes. Cycle: Menstrual(1-5):Iron★,VitC★ | Follicular(6-12):B-complex★,Zinc★ | Ovulation(13-15):Zinc★,VitC★,VitE★ | Luteal(16-28):Ca★,Mg★,B6★,VitE★,K★

Totals in message = state AFTER actions. Empty actions array for clarification questions.`;

// ── Meal Form ─────────────────────────────────────────────────────────────────
function MealForm({meal, onSave, onDelete, onBack}) {
  const isNew=!meal?.id;
  const [name,setName]=useState(meal?.name||"");
  const [cal,setCal]=useState(meal?.cal||"");
  const [pro,setPro]=useState(meal?.pro||"");
  const [ingText,setIngText]=useState((meal?.ing||[]).join("\n"));
  const [aliasText,setAliasText]=useState((meal?.aliases||[]).filter(a=>a!==meal?.name?.toLowerCase()).join(", "));
  const [swapText,setSwapText]=useState((meal?.swaps||[]).join("\n"));
  const [addOns,setAddOns]=useState(meal?.addOns||[]);
  const [aoName,setAoName]=useState(""); const [aoCal,setAoCal]=useState(""); const [aoPro,setAoPro]=useState("");
  const [note,setNote]=useState(meal?.note||"");
  const [confirmDel,setConfirmDel]=useState(false);

  const save=()=>{
    if(!name.trim()||!cal||!pro) return;
    const baseName=name.trim().toLowerCase();
    const extra=aliasText.split(",").map(s=>s.trim().toLowerCase()).filter(Boolean);
    onSave({id:meal?.id||`meal_${Date.now()}`,name:name.trim(),cal:+cal,pro:+pro,
      ing:ingText.split("\n").map(s=>s.trim()).filter(Boolean),
      aliases:[...new Set([baseName,...extra])],
      swaps:swapText.split("\n").map(s=>s.trim()).filter(Boolean),
      addOns, note});
  };
  const addAo=()=>{if(!aoName.trim()) return; setAddOns(p=>[...p,{name:aoName.trim(),cal:+aoCal||0,pro:+aoPro||0}]); setAoName(""); setAoCal(""); setAoPro(""); };

  const fInp=(val,set,ph,type="text",extra={})=>(
    <input value={val} onChange={e=>set(e.target.value)} placeholder={ph} type={type}
      style={{width:"100%",boxSizing:"border-box",background:"#f9f4ef",border:"2px solid #e8ddd4",borderRadius:12,padding:"9px 13px",fontSize:13,color:"#3d2c1e",outline:"none",...extra}}/>
  );
  const fTa=(val,set,ph,rows=3)=>(
    <textarea value={val} onChange={e=>set(e.target.value)} placeholder={ph} rows={rows}
      style={{width:"100%",boxSizing:"border-box",background:"#f9f4ef",border:"2px solid #e8ddd4",borderRadius:12,padding:"9px 13px",fontSize:12,color:"#3d2c1e",outline:"none",resize:"vertical",lineHeight:1.55}}/>
  );
  const lbl=t=><div style={{fontSize:11,color:"#9b8ea0",fontWeight:700,textTransform:"uppercase",letterSpacing:.6,marginBottom:5,marginTop:14}}>{t}</div>;

  return (
    <div style={{flex:1,overflowY:"auto",padding:16,background:"#fef8f2"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={onBack} style={{background:"#f0e8f8",border:"none",color:"#7c5cbf",borderRadius:20,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700}}>← Back</button>
        <span style={{fontSize:15,fontWeight:800,color:"#3d2c1e"}}>{isNew?"New Meal ✨":"Edit Meal"}</span>
        {!isNew?<button onClick={()=>setConfirmDel(true)} style={{background:"#fff0f0",border:"none",color:"#e05c5c",cursor:"pointer",fontSize:12,fontWeight:700,borderRadius:20,padding:"6px 14px"}}>Delete</button>:<div style={{width:60}}/>}
      </div>
      {confirmDel&&(
        <div style={{background:"#fff0f0",borderRadius:14,padding:14,marginBottom:14,border:"2px solid #fca5a5"}}>
          <div style={{fontSize:13,marginBottom:10,color:"#dc2626",fontWeight:600}}>Delete "{meal?.name}"?</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>onDelete(meal.id)} style={{flex:1,background:"#dc2626",border:"none",borderRadius:10,padding:"8px",color:"white",fontWeight:700,cursor:"pointer",fontSize:12}}>Yes, delete</button>
            <button onClick={()=>setConfirmDel(false)} style={{flex:1,background:"#f0e8f8",border:"none",borderRadius:10,padding:"8px",color:"#7c5cbf",fontWeight:700,cursor:"pointer",fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}
      {lbl("Meal Name")}{fInp(name,setName,"e.g. BEC")}
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}>{lbl("Calories")}{fInp(cal,setCal,"312","number")}</div>
        <div style={{flex:1}}>{lbl("Protein (g)")}{fInp(pro,setPro,"26","number")}</div>
      </div>
      {lbl("Ingredients (one per line)")}{fTa(ingText,setIngText,"Thomas' English Muffin — 100 cal / 4g\n...",4)}
      {lbl("Shorthand Aliases (comma separated)")}{fInp(aliasText,setAliasText,"e.g. bec, egg sandwich")}
      {lbl("Swaps (one per line)")}{fTa(swapText,setSwapText,"Bagel Thin — 110 cal / 4g",2)}
      {lbl("Add-ons")}
      {addOns.map((a,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#f0fdf4",borderRadius:10,padding:"7px 11px",marginBottom:5,fontSize:12,border:"1.5px solid #bbf7d0"}}>
          <span style={{flex:1,color:"#166534",fontWeight:600}}>{a.name}</span>
          <span style={{color:"#4a6070",marginRight:10}}>{a.cal}cal / {a.pro}g</span>
          <button onClick={()=>setAddOns(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#e05c5c",cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>
        </div>
      ))}
      <div style={{display:"flex",gap:6,marginTop:4}}>
        <input value={aoName} onChange={e=>setAoName(e.target.value)} placeholder="Add-on name"
          style={{flex:2,background:"#f9f4ef",border:"2px solid #e8ddd4",borderRadius:10,padding:"7px 10px",color:"#3d2c1e",fontSize:12,outline:"none"}}/>
        <input value={aoCal} onChange={e=>setAoCal(e.target.value)} placeholder="cal" type="number"
          style={{flex:1,background:"#f9f4ef",border:"2px solid #e8ddd4",borderRadius:10,padding:"7px 8px",color:"#3d2c1e",fontSize:12,outline:"none",minWidth:0}}/>
        <input value={aoPro} onChange={e=>setAoPro(e.target.value)} placeholder="g pro" type="number"
          style={{flex:1,background:"#f9f4ef",border:"2px solid #e8ddd4",borderRadius:10,padding:"7px 8px",color:"#3d2c1e",fontSize:12,outline:"none",minWidth:0}}/>
        <button onClick={addAo} style={{background:"#1cb8a0",border:"none",borderRadius:10,padding:"7px 12px",color:"white",cursor:"pointer",fontSize:15,fontWeight:700,flexShrink:0}}>+</button>
      </div>
      {lbl("Notes")}{fTa(note,setNote,"Optional notes...",2)}
      <button onClick={save} disabled={!name.trim()||!cal||!pro}
        style={{width:"100%",marginTop:18,marginBottom:20,background:(!name.trim()||!cal||!pro)?"#e8ddd4":"#1cb8a0",border:"none",borderRadius:14,padding:"13px",color:(!name.trim()||!cal||!pro)?"#a89080":"white",fontWeight:800,cursor:(!name.trim()||!cal||!pro)?"default":"pointer",fontSize:14}}>
        {isNew?"Save New Meal ✨":"Save Changes"}
      </button>
    </div>
  );
}

  const [saved,setSaved]=useState({});
  const [mealLib,setMealLib]=useState(BASE_MEALS);
  const [mlView,setMlView]=useState("list");
  const [mlEditing,setMlEditing]=useState(null);
  const [mlSearch,setMlSearch]=useState("");
  const [calDate,setCalDate]=useState(new Date());
  const [selDay,setSelDay]=useState(null);
  const [storageOk,setStorageOk]=useState(false);
  const [showLog,setShowLog]=useState(false);
  const chatEnd=useRef(null);
  const hist=useRef([]);

  useEffect(()=>{
    (async()=>{
      try {
        const sd=await window.storage.get("jfp_saved_days"); if(sd?.value) setSaved(JSON.parse(sd.value));
        const ml=await window.storage.get("jfp_meal_lib"); if(ml?.value) setMealLib(JSON.parse(ml.value));
        const cd=await window.storage.get("jfp_current_day");
        if(cd?.value){
          const st=JSON.parse(cd.value), today=getTodayStr();
          if(st.date===today){setDay(st);}
          else{
            if(st.date&&(st.loggedMeals?.length>0||st.calories>0)){
              const sdp=sd?.value?JSON.parse(sd.value):{};
              sdp[st.date]={...st,hitCalorieRange:st.calories>=1300&&st.calories<=1500,hitProteinGoal:st.protein>=140};
              setSaved(sdp);
            }
            setDay(EMPTY());
          }
        }
      } catch {}
      setStorageOk(true);
    })();
  },[]);

  useEffect(()=>{if(storageOk) window.storage.set("jfp_saved_days",JSON.stringify(saved)).catch(()=>{});},[saved,storageOk]);
  useEffect(()=>{if(storageOk) window.storage.set("jfp_current_day",JSON.stringify(day)).catch(()=>{});},[day,storageOk]);
  useEffect(()=>{if(storageOk) window.storage.set("jfp_meal_lib",JSON.stringify(mealLib)).catch(()=>{});},[mealLib,storageOk]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  function applyActions(actions,d,sd){
    let nd={...d,loggedMeals:[...d.loggedMeals]},nsd={...sd};
    for(const a of(actions||[])){
      if(a.type==="RESET_DAY"){
        if(nd.date&&(nd.loggedMeals.length>0||nd.calories>0)) nsd[nd.date]={...nd,hitCalorieRange:nd.calories>=1300&&nd.calories<=1500,hitProteinGoal:nd.protein>=140};
        nd={...EMPTY(),date:a.date||getTodayStr()};
      } else if(a.type==="LOG_MEAL"){
        nd={...nd,calories:+(nd.calories+a.calories).toFixed(1),protein:+(nd.protein+a.protein).toFixed(1),
            loggedMeals:[...nd.loggedMeals,{name:a.name,calories:a.calories,protein:a.protein,notes:a.notes||""}]};
      } else if(a.type==="REMOVE_MEAL"){
        const r=nd.loggedMeals[a.index];
        if(r) nd={...nd,calories:+(nd.calories-r.calories).toFixed(1),protein:+(nd.protein-r.protein).toFixed(1),loggedMeals:nd.loggedMeals.filter((_,i)=>i!==a.index)};
      } else if(a.type==="SET_CYCLE") nd={...nd,cycleDay:a.day};
    }
    return {nd,nsd};
  }

  function findMealByText(text){
    const q=text.toLowerCase().trim();
    const cleaned=q.replace(/^(log|recipe for|what is the recipe for|recipe|eat)\s+/,'').trim();
    return mealLib.find(m=>[m.name.toLowerCase(),...(m.aliases||[])].some(a=>cleaned===a||cleaned.includes(a)||q.includes(a)));
  }

  function localReply(txt){
    const q=txt.toLowerCase().trim();
    if(q==="new day"||q==="reset day"||q==="reset"){
      return {message:`New day started for ${getTodayStr()}.`,actions:[{type:"RESET_DAY",date:getTodayStr()}]};
    }
    if(q.includes("status")||q.includes("where am i")){
      const calLeft=day.calorieGoalMax-day.calories;
      const proLeft=(day.proteinGoal-day.protein).toFixed(1);
      return {message:`Status: ${day.calories} cal and ${day.protein}g protein. Remaining: ${calLeft} cal to 1500 and ${proLeft}g protein to 140g.`,actions:[]};
    }
    if(q.startsWith("log ")){
      const meal=findMealByText(q);
      if(!meal) return {message:"I don't recognize that meal. Use the Meals tab to check the exact name or add it first.",actions:[]};
      return {message:`Logged ${meal.name}: ${meal.cal} cal / ${meal.pro}g protein. New total: ${+(day.calories+meal.cal).toFixed(1)} cal and ${+(day.protein+meal.pro).toFixed(1)}g protein.`,actions:[{type:"LOG_MEAL",name:meal.name,calories:meal.cal,protein:meal.pro,notes:""}]};
    }
    if(q.includes("recipe")){
      const meal=findMealByText(q);
      if(!meal) return {message:"Which saved meal do you want the recipe for?",actions:[]};
      const ingredients=(meal.ing||[]).length?meal.ing.map(x=>`• ${x}`).join("\n"):"No saved ingredients.";
      const swaps=(meal.swaps||[]).length?`\n\nSwaps:\n${meal.swaps.map(x=>`• ${x}`).join("\n")}`:"";
      const note=meal.note?`\n\nNote: ${meal.note}`:"";
      return {message:`${meal.name}\n${meal.cal} cal / ${meal.pro}g protein\n\n${ingredients}${swaps}${note}`,actions:[]};
    }
    if(q.includes("what should i eat")||q.includes("suggest")||q.includes("recommend")){
      const remainingCal=day.calorieGoalMax-day.calories;
      const remainingPro=day.proteinGoal-day.protein;
      const options=mealLib.filter(m=>m.cal<=Math.max(remainingCal,250)).sort((a,b)=>(b.pro/b.cal)-(a.pro/a.cal)).slice(0,5);
      const list=(options.length?options:mealLib.slice(0,5)).map(m=>`• ${m.name}: ${m.cal} cal / ${m.pro}g`).join("\n");
      return {message:`Good saved options:\n${list}\n\nCurrent remaining: ${remainingCal} cal to 1500 and ${remainingPro.toFixed(1)}g protein to 140g.`,actions:[]};
    }
    if(q==="mv"){
      return {message:"MV mode. What cycle day are you on? I’ll keep the plate ≤220 cal and use the saved safe list.",actions:[]};
    }
    return {message:"I can log saved meals, show status, start a new day, pull recipes, or suggest meals from your library. Try: Log BEC, Status, Recipe for pasta, or What should I eat.",actions:[]};
  }

  async function send(){
    const txt=inp.trim(); if(!txt||loading) return;
    setInp(""); setMsgs(p=>[...p,{role:"user",text:txt}]); setLoading(true);
    try{
      const parsed=localReply(txt);
      const {nd,nsd}=applyActions(parsed.actions,day,saved);
      setDay(nd); setSaved(nsd);
      hist.current=[...hist.current.slice(-16),{role:"user",content:txt},{role:"assistant",content:parsed.message}];
      setMsgs(p=>[...p,{role:"assistant",text:parsed.message}]);
    }catch{setMsgs(p=>[...p,{role:"assistant",text:"Something went wrong. Try again."}]);}
    setLoading(false);
  }

  function removeLogged(i){
    const r=day.loggedMeals[i]; if(!r) return;
    setDay(d=>({...d,calories:+(d.calories-r.calories).toFixed(1),protein:+(d.protein-r.protein).toFixed(1),loggedMeals:d.loggedMeals.filter((_,j)=>j!==i)}));
  }
  function saveMeal(meal){setMealLib(p=>p.some(m=>m.id===meal.id)?p.map(m=>m.id===meal.id?meal:m):[...p,meal]);setMlView("list");setMlEditing(null);}
  function deleteMeal(id){setMealLib(p=>p.filter(m=>m.id!==id));setMlView("list");setMlEditing(null);}

  const yr=calDate.getFullYear(),mo=calDate.getMonth();
  const daysInMo=new Date(yr,mo+1,0).getDate(),firstDay=new Date(yr,mo,1).getDay();
  function getSaved(dn){return Object.values(saved).find(sd=>{const d=parseDt(sd.date);return d&&d.getFullYear()===yr&&d.getMonth()===mo&&d.getDate()===dn;});}
  function isToday(dn){const d=parseDt(day.date);return d&&d.getFullYear()===yr&&d.getMonth()===mo&&d.getDate()===dn;}

  const calPct=Math.min(day.calories/day.calorieGoalMax,1);
  const proPct=Math.min(day.protein/day.proteinGoal,1);
  const calOver=day.calories>day.calorieGoalMax, calOk=day.calories>=1300&&day.calories<=1500, proOk=day.protein>=140;

  const TEAL="#1cb8a0", ORANGE="#f07844", PURPLE="#9b8fd4", CREAM="#fef8f2", CARD="#ffffff";
  const filteredMeals=mealLib.filter(m=>m.name.toLowerCase().includes(mlSearch.toLowerCase()));

  const tabBtn=(t,icon,lbl)=>(
    <button onClick={()=>setTab(t)} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px",borderRadius:22,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
      background:tab===t?TEAL:"#f0e8f8",color:tab===t?"white":PURPLE,boxShadow:tab===t?"0 3px 10px rgba(28,184,160,0.35)":"none",transition:"all 0.2s"}}>
      <span>{icon}</span><span>{lbl}</span>
    </button>
  );

  return (
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:CREAM,color:"#3d2c1e",height:"100vh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden"}}>
      <TopBlobs/>

      {/* Header */}
      <div style={{position:"relative",zIndex:1,padding:"14px 18px 8px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{lineHeight:1,marginBottom:2}}>
              <span style={{fontSize:58,fontWeight:900,color:"#f97316",fontStyle:"italic",letterSpacing:-2}}>J</span>
              <span style={{fontSize:58,fontWeight:900,color:"#ec4899",fontStyle:"italic",letterSpacing:-2}}>F</span>
              <span style={{fontSize:58,fontWeight:900,color:"#0d9488",fontStyle:"italic",letterSpacing:-2}}>P</span>
              <span style={{fontSize:13,color:"#9b8ea0",marginLeft:4}}>✦</span>
              <span style={{fontSize:10,color:"#fbbf24",marginLeft:2}}>✦</span>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:"#0d9488",letterSpacing:0.2}}>Johnni's Fitness Pal</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,paddingTop:4}}>
            <span style={{fontSize:18}}>🌸</span>
            <SunSVG/>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          {tabBtn("chat","💬","Chat")}
          {tabBtn("meals","🍽","Meals")}
          {tabBtn("calendar","📅","Calendar")}
        </div>
      </div>

      {/* CHAT TAB */}
      {tab==="chat"&&<>
        {/* Stats card */}
        <div style={{margin:"0 14px 0",background:CARD,borderRadius:20,boxShadow:"0 4px 20px rgba(0,0,0,0.08)",padding:"14px 16px",flexShrink:0,position:"relative",zIndex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{fontSize:16}}>📅</span>
              <span style={{fontWeight:700,fontSize:14,color:"#3d2c1e"}}>{day.date}</span>
            </div>
            <div style={{background:calOk?"#d1fae5":calOver?"#fee2e2":"#ede9fe",borderRadius:20,padding:"3px 11px",fontSize:11,fontWeight:700,color:calOk?TEAL:calOver?"#dc2626":PURPLE}}>
              {calOk?"✓ On track":calOver?"⚠ Over":"Building..."}
            </div>
          </div>
          {[
            {icon:"🔥",iconBg:"#fff7ed",label:"Calories",val:day.calories,max:"1300–1500",left:day.calorieGoalMax-day.calories,pct:calPct,track:"#fed7aa",fill:calOver?"#ef4444":calOk?TEAL:ORANGE,valColor:ORANGE,leftColor:TEAL},
            {icon:"💪",iconBg:"#f0fdf4",label:"Protein",val:day.protein+"g",max:"140g",left:(day.proteinGoal-day.protein).toFixed(1)+"g",pct:proPct,track:"#ccfbf1",fill:proOk?TEAL:PURPLE,valColor:TEAL,leftColor:"#9b8ea0"}
          ].map(({icon,iconBg,label,val,max,left,pct,track,fill,valColor,leftColor},i)=>(
            <div key={i} style={{marginBottom:i===0?12:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:iconBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                    <span style={{fontWeight:700,fontSize:13,color:"#3d2c1e"}}>{label}</span>
                    <span style={{fontSize:12}}>
                      <span style={{color:valColor,fontWeight:700}}>{val}</span>
                      <span style={{color:"#a89080"}}> / {max}</span>
                      {pct<1&&<span style={{color:leftColor,fontWeight:600}}> • {left} left</span>}
                    </span>
                  </div>
                  <div style={{height:7,background:track,borderRadius:4,marginTop:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct*100}%`,background:fill,borderRadius:4,transition:"width 0.4s"}}/>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10,position:"relative",zIndex:1}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:8}}>
              {m.role==="assistant"&&<AlienAvatar/>}
              <div style={{maxWidth:"75%",padding:"11px 15px",borderRadius:m.role==="user"?"18px 18px 5px 18px":"18px 18px 18px 5px",
                background:m.role==="user"?TEAL:CARD,color:m.role==="user"?"white":"#3d2c1e",
                fontSize:13,lineHeight:1.55,whiteSpace:"pre-wrap",wordBreak:"break-word",
                boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
                {m.text}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
              <AlienAvatar/>
              <div style={{padding:"11px 18px",borderRadius:"18px 18px 18px 5px",background:CARD,boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
                <div style={{display:"flex",gap:4}}>
                  {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#d4c5bc",animation:`bounce 1s ${i*0.2}s infinite`}}/>)}
                </div>
              </div>
            </div>
          )}
          <div ref={chatEnd}/>
        </div>

        {/* Today's log */}
        {day.loggedMeals.length>0&&(
          <div style={{margin:"0 14px",background:CARD,borderRadius:16,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",maxHeight:140,overflowY:"auto",flexShrink:0,position:"relative",zIndex:1}}>
            <div onClick={()=>setShowLog(p=>!p)} style={{padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:12,color:"#9b8ea0",fontWeight:700}}>Today's Log ({day.loggedMeals.length})</span>
              <span style={{fontSize:11,color:PURPLE}}>{showLog?"▲":"▼"}</span>
            </div>
            {showLog&&day.loggedMeals.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 14px",fontSize:12,borderTop:"1px solid #f5ede6"}}>
                <span style={{flex:1,color:"#3d2c1e",fontWeight:600}}>{m.name}</span>
                <span style={{color:"#a89080",marginRight:10}}>{m.calories}cal · {m.protein}g</span>
                <button onClick={()=>removeLogged(i)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        )}

        {/* Input */}
        <div style={{position:"relative",zIndex:1,padding:"10px 14px 16px",marginTop:4,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:CARD,borderRadius:26,padding:"6px 6px 6px 14px",boxShadow:"0 4px 18px rgba(0,0,0,0.1)"}}>
            <span style={{fontSize:16,color:PURPLE}}>✦</span>
            <input value={inp} onChange={e=>setInp(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="Log BEC · Status · MV · New day..."
              style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:13,color:"#3d2c1e"}}/>
            <button onClick={send} disabled={loading||!inp.trim()}
              style={{background:(!loading&&inp.trim())?ORANGE:"#e8ddd4",border:"none",borderRadius:22,padding:"9px 20px",color:"white",fontWeight:800,cursor:(!loading&&inp.trim())?"pointer":"default",fontSize:13,transition:"all 0.2s",flexShrink:0}}>
              Send
            </button>
          </div>
        </div>
        <div style={{height:20,position:"relative",flexShrink:0}}><BottomWave/></div>
      </>}

      {/* MEALS TAB */}
      {tab==="meals"&&(
        (mlView==="edit"||mlView==="new")?(
          <MealForm meal={mlView==="new"?null:mlEditing} onSave={saveMeal} onDelete={deleteMeal} onBack={()=>{setMlView("list");setMlEditing(null);}}/>
        ):(
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",position:"relative",zIndex:1}}>
            <div style={{padding:"10px 14px",display:"flex",gap:8,flexShrink:0}}>
              <div style={{flex:1,display:"flex",alignItems:"center",background:CARD,borderRadius:22,padding:"7px 14px",gap:8,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
                <span style={{fontSize:14}}>🔍</span>
                <input value={mlSearch} onChange={e=>setMlSearch(e.target.value)} placeholder="Search meals..."
                  style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:13,color:"#3d2c1e"}}/>
              </div>
              <button onClick={()=>{setMlEditing(null);setMlView("new");}}
                style={{background:TEAL,border:"none",borderRadius:22,padding:"7px 16px",color:"white",fontWeight:800,cursor:"pointer",fontSize:13,boxShadow:"0 3px 10px rgba(28,184,160,0.35)",flexShrink:0}}>
                + New
              </button>
            </div>
            <div style={{padding:"4px 14px",flex:1,overflowY:"auto"}}>
              <div style={{fontSize:11,color:"#9b8ea0",marginBottom:8,fontWeight:600}}>{filteredMeals.length} meals saved</div>
              {filteredMeals.map(m=>(
                <div key={m.id} onClick={()=>{setMlEditing(m);setMlView("edit");}}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:CARD,borderRadius:16,padding:"13px 16px",marginBottom:8,cursor:"pointer",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",border:"1.5px solid transparent",transition:"border-color 0.15s"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#3d2c1e",marginBottom:2}}>{m.name}</div>
                    {m.ing?.length>0&&<div style={{fontSize:11,color:"#a89080"}}>{m.ing.length} ingredient{m.ing.length!==1?"s":""}{m.addOns?.length>0?` · ${m.addOns.length} add-on${m.addOns.length!==1?"s":""}`:""}</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                    <div style={{fontSize:14,fontWeight:700,color:ORANGE}}>{m.cal} cal</div>
                    <div style={{fontSize:12,fontWeight:600,color:TEAL}}>{m.pro}g pro</div>
                  </div>
                </div>
              ))}
              {filteredMeals.length===0&&<div style={{textAlign:"center",color:"#a89080",fontSize:13,marginTop:30}}>No meals match "{mlSearch}"</div>}
              <div style={{height:20}}/>
            </div>
          </div>
        )
      )}

      {/* CALENDAR TAB */}
      {tab==="calendar"&&(
        <div style={{flex:1,overflowY:"auto",padding:"0 14px 16px",position:"relative",zIndex:1}}>
          {selDay?(
            <div>
              <button onClick={()=>setSelDay(null)} style={{background:"#f0e8f8",border:"none",color:PURPLE,borderRadius:20,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:14,marginTop:6}}>← Back</button>
              <div style={{background:CARD,borderRadius:20,padding:16,boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}>
                <div style={{fontWeight:800,fontSize:16,marginBottom:6,color:"#3d2c1e"}}>{selDay.date}</div>
                <div style={{display:"flex",gap:14,marginBottom:12}}>
                  <span style={{fontSize:13}}><span style={{color:"#a89080"}}>Cal: </span><span style={{color:selDay.hitCalorieRange?TEAL:selDay.calories>1500?"#dc2626":ORANGE,fontWeight:700}}>{selDay.calories}</span><span style={{color:"#a89080"}}>/1300–1500</span></span>
                  <span style={{fontSize:13}}><span style={{color:"#a89080"}}>Pro: </span><span style={{color:selDay.hitProteinGoal?TEAL:"#a89080",fontWeight:700}}>{selDay.protein}g</span><span style={{color:"#a89080"}}>/140g</span></span>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  {[["Cal goal",selDay.hitCalorieRange],["Protein goal",selDay.hitProteinGoal]].map(([lbl,hit])=>(
                    <span key={lbl} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:hit?"#d1fae5":"#fee2e2",color:hit?"#065f46":"#dc2626",fontWeight:700}}>{hit?"✓":"✗"} {lbl}</span>
                  ))}
                </div>
                <div style={{borderTop:"1px solid #f5ede6",paddingTop:10}}>
                  <div style={{fontSize:11,color:"#a89080",marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Meals</div>
                  {(selDay.loggedMeals||[]).length===0
                    ?<div style={{color:"#a89080",fontSize:12}}>No meals logged</div>
                    :(selDay.loggedMeals||[]).map((m,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:"1px solid #f5ede6",color:"#3d2c1e"}}>
                          <span style={{fontWeight:600}}>{m.name}</span><span style={{color:"#a89080"}}>{m.calories}cal · {m.protein}g</span>
                        </div>
                      ))}
                </div>
              </div>
            </div>
          ):(<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"8px 0 14px"}}>
              <button onClick={()=>setCalDate(new Date(yr,mo-1,1))} style={{background:CARD,border:"none",color:PURPLE,borderRadius:20,padding:"6px 14px",cursor:"pointer",fontSize:16,fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>‹</button>
              <span style={{fontWeight:800,fontSize:15,color:"#3d2c1e"}}>{calDate.toLocaleString("default",{month:"long",year:"numeric"})}</span>
              <button onClick={()=>setCalDate(new Date(yr,mo+1,1))} style={{background:CARD,border:"none",color:PURPLE,borderRadius:20,padding:"6px 14px",cursor:"pointer",fontSize:16,fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
              {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,color:"#a89080",padding:"3px 0",fontWeight:700}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {Array.from({length:firstDay},(_,i)=><div key={`e${i}`}/>)}
              {Array.from({length:daysInMo},(_,i)=>{
                const dn=i+1,sv=getSaved(dn),tod=isToday(dn);
                return(
                  <div key={dn} onClick={()=>sv?setSelDay(sv):null}
                    style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:12,
                      cursor:sv?"pointer":"default",background:tod?"#ccfbf1":sv?CARD:"transparent",
                      border:tod?`2px solid ${TEAL}`:sv?"1.5px solid #f5ede6":"1.5px solid transparent",
                      boxShadow:sv?"0 2px 8px rgba(0,0,0,0.06)":"none"}}>
                    <span style={{fontSize:12,fontWeight:tod?800:400,color:tod?TEAL:"#3d2c1e"}}>{dn}</span>
                    {sv&&<div style={{display:"flex",gap:2,marginTop:2}}>
                      <div style={{width:5,height:5,borderRadius:"50%",background:sv.hitCalorieRange?TEAL:"#f87171"}}/>
                      <div style={{width:5,height:5,borderRadius:"50%",background:sv.hitProteinGoal?TEAL:"#f87171"}}/>
                    </div>}
                    {tod&&day.loggedMeals.length>0&&!sv&&<div style={{width:5,height:5,borderRadius:"50%",background:ORANGE,marginTop:2}}/>}
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:14,marginTop:12,fontSize:11,color:"#a89080"}}>
              <span><span style={{color:TEAL}}>●</span> Goals hit</span>
              <span><span style={{color:"#f87171"}}>●</span> Missed</span>
              <span><span style={{color:ORANGE}}>●</span> Today</span>
            </div>
            {Object.keys(saved).length>0&&(
              <div style={{marginTop:18}}>
                <div style={{fontSize:11,color:"#a89080",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>History</div>
                {Object.values(saved).sort((a,b)=>(parseDt(b.date)||0)-(parseDt(a.date)||0)).map(sd=>(
                  <div key={sd.date} onClick={()=>setSelDay(sd)}
                    style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:CARD,borderRadius:14,marginBottom:6,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                    <span style={{fontSize:13,fontWeight:600,color:"#3d2c1e"}}>{sd.date}</span>
                    <div style={{display:"flex",gap:10,fontSize:12}}>
                      <span style={{color:sd.hitCalorieRange?TEAL:"#f87171",fontWeight:600}}>{sd.calories} cal</span>
                      <span style={{color:sd.hitProteinGoal?TEAL:"#f87171",fontWeight:600}}>{sd.protein}g pro</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {Object.keys(saved).length===0&&<div style={{textAlign:"center",color:"#a89080",fontSize:13,marginTop:30}}>No saved days yet. Start chatting to track!</div>}
          </>)}
        </div>
      )}
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}`}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<JFP />);

  </script>
</body>
</html>
